<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Football Predictions by League — KickPick</title>
  <meta name="description" content="Browse AI football predictions by league — Champions League, Premier League, Serie A, La Liga, Bundesliga and more.">
  <link rel="canonical" href="https://kickpick.vercel.app/pages/leagues.html">
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .league-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 14px;
      margin-bottom: 32px;
    }
    .league-card {
      background: var(--navy-700);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 18px;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      text-decoration: none;
      display: block;
    }
    .league-card:hover { border-color: var(--border-mid); background: var(--navy-600); }
    .league-card.active { border-color: var(--amber); }
    .lc-flag { font-size: 26px; margin-bottom: 8px; }
    .lc-name { font-family: var(--font-display); font-size: 17px; font-weight: 700; color: var(--text-primary); margin-bottom: 3px; }
    .lc-meta { font-size: 12px; color: var(--text-muted); font-family: var(--font-mono); }
    .lc-pip { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 5px; }
  </style>
</head>
<body>

<div id="site-nav"></div>

<section class="hero-strip">
  <div class="container">
    <h1>Browse by <em>league</em></h1>
    <div class="hero-meta">
      <span class="hero-date">All European competitions</span>
    </div>
  </div>
</section>

<div class="container">
  <div class="ad-slot ad-slot-leaderboard" aria-label="Advertisement">Ad</div>
</div>

<main class="page-body">
  <div class="container">

    <div class="section-heading">Select a competition</div>

    <div class="league-grid">
      <div class="league-card" data-league="Champions League">
        <div class="lc-flag">🏆</div>
        <div class="lc-name">Champions League</div>
        <div class="lc-meta"><span class="lc-pip" style="background:#38bdf8"></span>UEFA · Europe</div>
      </div>
      <div class="league-card" data-league="Premier League">
        <div class="lc-flag">🏴󠁧󠁢󠁥󠁮󠁧󠁿</div>
        <div class="lc-name">Premier League</div>
        <div class="lc-meta"><span class="lc-pip" style="background:#22c55e"></span>England · 20 clubs</div>
      </div>
      <div class="league-card" data-league="Serie A">
        <div class="lc-flag">🇮🇹</div>
        <div class="lc-name">Serie A</div>
        <div class="lc-meta"><span class="lc-pip" style="background:#f5a623"></span>Italy · 20 clubs</div>
      </div>
      <div class="league-card" data-league="La Liga">
        <div class="lc-flag">🇪🇸</div>
        <div class="lc-name">La Liga</div>
        <div class="lc-meta"><span class="lc-pip" style="background:#ef4444"></span>Spain · 20 clubs</div>
      </div>
      <div class="league-card" data-league="Bundesliga">
        <div class="lc-flag">🇩🇪</div>
        <div class="lc-name">Bundesliga</div>
        <div class="lc-meta"><span class="lc-pip" style="background:#a78bfa"></span>Germany · 18 clubs</div>
      </div>
      <div class="league-card" data-league="Ligue 1">
        <div class="lc-flag">🇫🇷</div>
        <div class="lc-name">Ligue 1</div>
        <div class="lc-meta"><span class="lc-pip" style="background:#fb923c"></span>France · 18 clubs</div>
      </div>
    </div>

    <div class="ad-slot ad-slot-inline" aria-label="Advertisement">Ad</div>

    <div class="section-heading" id="league-label">All leagues — today's matches</div>
    <div id="league-matches"></div>

  </div>
</main>

<div id="site-footer"></div>

<script src="/js/shared.js"></script>
<script src="/js/matches.js"></script>
<script>
  injectNav('leagues');
  injectFooter();

  function showLeague(league) {
    const matches = getMatches().filter(m => league === 'all' || m.league === league);
    document.getElementById('league-matches').innerHTML = matches.map(renderMatchCard).join('');
    document.getElementById('league-label').textContent =
      `${league === 'all' ? 'All leagues' : league} — ${matches.length} match${matches.length !== 1 ? 'es' : ''} today`;
    document.querySelectorAll('.league-card').forEach(c => {
      c.classList.toggle('active', c.dataset.league === league);
    });
  }

  document.querySelectorAll('.league-card').forEach(card => {
    card.addEventListener('click', () => showLeague(card.dataset.league));
  });

  // Check URL param
  const params = new URLSearchParams(window.location.search);
  showLeague(params.get('league') || 'all');
</script>

</body>
</html>
